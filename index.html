<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloustHost</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="particles"></canvas>

<header>
<div class="logo">CloustHost</div>
<nav>
<a href="#">Home</a>
<a href="#">Plans</a>
<a href="#">Discord</a>
</nav>
</header>

<section class="hero">
<h1>High Performance Minecraft Hosting</h1>
<p>Lag-free servers with instant setup</p>
<a class="btn primary" href="#">Get Started</a>
<a class="btn secondary" href="#">View Plans</a>
</section>

<section class="features">
<div class="feature-box">⚡ Instant Setup</div>
<div class="feature-box">🛡 DDoS Protection</div>
<div class="feature-box">🚀 Low Latency</div>
</section>

<footer>
© 2026 CloustHost
</footer>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
particles.push({
x: Math.random() * canvas.width,
y: Math.random() * canvas.height,
r: Math.random() * 2,
dx: (Math.random() - 0.5) * 0.5,
dy: (Math.random() - 0.5) * 0.5
});
}

function draw() {
ctx.clearRect(0, 0, canvas.width, canvas.height);

ctx.fillStyle = "rgba(255,255,255,0.6)";

particles.forEach(p => {
ctx.beginPath();
ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
ctx.fill();

p.x += p.dx;
p.y += p.dy;

if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
});

requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
